name: 'Setup Bella CLI'
description: >
  Install the Bella CLI on Linux, macOS, or Windows.
  Self-contained binary — no Node.js, no .NET runtime, no package manager required.

branding:
  icon: 'lock'
  color: 'purple'

inputs:
  version:
    description: >
      CLI version to install (semver without "v", e.g. 1.2.3).
      Omit or set to "latest" to always install the latest release.
    required: false
    default: 'latest'
  bella-url:
    description: >
      Bella Baxter API base URL.
      When provided, exported as BELLA_BAXTER_URL for all subsequent steps in the job.
    required: false
  oidc:
    description: >
      Set to "true" to exchange a GitHub OIDC token for a short-lived Bella API key.
      Requires id-token: write permission in the workflow job.
      Exports BELLA_API_KEY to $GITHUB_ENV when successful.
    required: false
    default: 'false'

outputs:
  bella-version:
    description: 'The installed Bella CLI version string.'
    value: ${{ steps.read-version.outputs.version }}

runs:
  using: 'composite'
  steps:
    # ── Linux / macOS ──────────────────────────────────────────────────────────
    - name: Install Bella CLI (Linux / macOS)
      if: runner.os != 'Windows'
      shell: bash
      env:
        BELLA_INSTALL_VERSION: ${{ inputs.version }}
        # Install to a writable temp directory — no sudo required on managed runners.
        BELLA_INSTALL_DIR: ${{ runner.temp }}/bella-bin
      run: |
        mkdir -p "$BELLA_INSTALL_DIR"

        VERSION_FLAG=""
        if [ "$BELLA_INSTALL_VERSION" != "latest" ] && [ -n "$BELLA_INSTALL_VERSION" ]; then
          VERSION_FLAG="--version $BELLA_INSTALL_VERSION"
        fi

        # BELLA_INSTALL_DIR is read by the install script.
        curl -sSfL \
          https://raw.githubusercontent.com/Cosmic-Chimps/bella-baxter-cli/main/scripts/install-bella.sh \
          | bash -s -- $VERSION_FLAG

        echo "$BELLA_INSTALL_DIR" >> "$GITHUB_PATH"

    # ── Windows ────────────────────────────────────────────────────────────────
    - name: Install Bella CLI (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        BELLA_INSTALL_VERSION: ${{ inputs.version }}
        # BELLA_INSTALL_DIR is read by the install script.
        BELLA_INSTALL_DIR: ${{ runner.temp }}\bella-bin
      run: |
        New-Item -ItemType Directory -Force -Path $env:BELLA_INSTALL_DIR | Out-Null

        # BELLA_VERSION is read by the install script; leave empty to fetch latest.
        if ($env:BELLA_INSTALL_VERSION -and $env:BELLA_INSTALL_VERSION -ne 'latest') {
          $env:BELLA_VERSION = $env:BELLA_INSTALL_VERSION
        }

        # BELLA_INSTALL_DIR is already set — the install script picks it up.
        irm https://raw.githubusercontent.com/Cosmic-Chimps/bella-baxter-cli/main/scripts/install-bella.ps1 | iex

        # Add to GITHUB_PATH so subsequent steps can find the binary.
        $env:BELLA_INSTALL_DIR | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    # ── Verify & capture version ───────────────────────────────────────────────
    - name: Read installed version
      id: read-version
      shell: bash
      run: |
        VERSION=$(bella --version 2>&1 | head -1)
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Bella CLI $VERSION installed successfully."

    # ── Optional: export API URL for subsequent steps ──────────────────────────
    - name: Export BELLA_BAXTER_URL
      if: inputs.bella-url != ''
      shell: bash
      env:
        BELLA_URL: ${{ inputs.bella-url }}
      run: |
        echo "BELLA_BAXTER_URL=$BELLA_URL" >> "$GITHUB_ENV"

    # ── Optional: OIDC token exchange for short-lived Bella API key ────────────
    - name: Authenticate via OIDC
      if: inputs.oidc == 'true'
      shell: bash
      env:
        BELLA_BAXTER_URL: ${{ env.BELLA_BAXTER_URL }}
      run: |
        bella auth oidc
